server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers — nginx is the single authoritative source for these.
    # The server middleware only adds HSTS (conditional on COOKIE_SECURE).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://avatars.githubusercontent.com; connect-src 'self'; frame-ancestors 'none';" always;

    # Cache hashed assets forever
    location ~* "\.[0-9a-f]{8}\.(js|css|woff2?|png|svg|ico)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API and auth calls to the server container.
    # nginx is the single public entry point — the browser never talks directly
    # to the server, so no CORS preflight is triggered.
    location ~ ^/(auth|api|proxy|system)(/|$) {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        # Don't buffer — lets streaming/chunked responses flow through
        proxy_buffering off;
        # Strip any security headers the server sets — nginx is authoritative for
        # these (set above). HSTS is intentionally absent here: the server sets it
        # conditionally based on COOKIE_SECURE and nginx passes it through untouched.
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
