name: Bug report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please check [existing issues](../../issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click on …
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Docker version, browser, OS, and your Dashlight version (from the About page or image tag).
      placeholder: |
        Dashlight: v1.2.0
        Docker: 27.x
        Browser: Chrome 124
        OS: macOS 15
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Run `docker compose logs server` or `docker compose logs web` and paste anything relevant. Screenshots welcome.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this is not already reported
          required: true
        - label: I am running the latest released version
