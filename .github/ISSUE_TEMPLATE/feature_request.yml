name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Dashlight is intentionally lightweight. Feature requests that require a database, external services, or significant operational overhead are unlikely to be accepted — but feel free to make the case.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point this addresses. "I want X" is less useful than "I have to do Y every time because Z is missing."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? UI sketch, API shape, config option — anything concrete helps.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you are currently using, or other approaches you considered and why you ruled them out.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this has not already been requested
          required: true
