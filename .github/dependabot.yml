version: 2

updates:
  # ============================================================================
  # NPM Server
  # ============================================================================
  - package-ecosystem: npm
    directory: "/packages/server"
    schedule:
      interval: weekly
      day: sunday
      time: "01:00"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    open-pull-requests-limit: 2
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(server):"
      include: "scope"
    groups:
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # NPM Web
  # ============================================================================
  - package-ecosystem: npm
    directory: "/packages/web"
    schedule:
      interval: weekly
      day: sunday
      time: "01:30"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    open-pull-requests-limit: 2
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(web):"
      include: "scope"
    groups:
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # Docker
  # ============================================================================
  - package-ecosystem: docker
    directories:
      - "/web/Dockerfile"
      - "/server/Dockerfile"
    schedule:
      interval: weekly
      day: sunday
      time: "02:00"
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(docker):"
    # Keep version updates as one PR per image; only security updates are grouped.
    groups:
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # GitHub Actions - Workflow updates
  # ============================================================================
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
      time: "02:30"
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(gha):"
    groups:
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"