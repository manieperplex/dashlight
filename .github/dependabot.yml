version: 2

updates:
  # ============================================================================
  # NPM Root — pnpm workspace catalog + root devDependencies
  # ============================================================================
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
      time: "00:30"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    groups:
      tooling:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "typescript*"
          - "@typescript-eslint/*"
          - "vitest"
          - "@vitest/*"
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # NPM Server
  - package-ecosystem: npm
    directory: "/packages/server"
    schedule:
      interval: weekly
      day: sunday
      time: "01:00"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(server):"
      include: "scope"
    ignore:
      # pnpm catalog-managed — updated via root entry to keep pnpm-workspace.yaml in sync
      - dependency-name: "eslint"
      - dependency-name: "typescript"
      - dependency-name: "typescript-eslint"
      - dependency-name: "vitest"
      - dependency-name: "@vitest/coverage-v8"
    groups:
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # NPM Web
  # ============================================================================
  - package-ecosystem: npm
    directory: "/packages/web"
    schedule:
      interval: weekly
      day: sunday
      time: "01:30"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(web):"
      include: "scope"
    ignore:
      # pnpm catalog-managed — updated via root entry to keep pnpm-workspace.yaml in sync
      - dependency-name: "eslint"
      - dependency-name: "typescript"
      - dependency-name: "typescript-eslint"
      - dependency-name: "vitest"
      - dependency-name: "@vitest/coverage-v8"
    groups:
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # Docker
  # ============================================================================
  - package-ecosystem: docker
    directories:
      - "/packages/web"
      - "/packages/server"
    schedule:
      interval: weekly
      day: sunday
      time: "02:00"
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(docker):"
    # Keep version updates as one PR per image; only security updates are grouped.
    groups:
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # ============================================================================
  # GitHub Actions - Workflow updates
  # ============================================================================
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
      time: "02:30"
    open-pull-requests-limit: 1
    assignees:
      - "manieperplex"
    commit-message:
      prefix: "chore(gha):"
    groups:
      version-all:
        applies-to: version-updates
        patterns: ["*"]
      security-all:
        applies-to: security-updates
        patterns: ["*"]
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"