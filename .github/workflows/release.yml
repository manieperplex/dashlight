name: Release

on:
  push:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

# Never cancel a release mid-flight; queue instead.
concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Check for new version
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if git tag --list "${TAG}" | grep -q "${TAG}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false"          >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"

            # Mark pre-release versions (e.g. 1.0.0-rc.2, 2.0.0-beta.1)
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true"  >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Sync sub-package versions
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          for pkg in packages/server/package.json packages/web/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
              p.version = process.env.VERSION;
              fs.writeFileSync(process.argv[1], JSON.stringify(p, null, 2) + '\n');
            " "$pkg"
          done

      - name: Commit, tag, and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit only if sub-packages needed syncing
          if ! git diff --quiet packages/server/package.json packages/web/package.json; then
            git add packages/server/package.json packages/web/package.json
            git commit -m "chore: sync package versions to ${{ steps.check.outputs.tag }}"
          fi

          git tag -a "${{ steps.check.outputs.tag }}" -m "Release ${{ steps.check.outputs.tag }}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          prerelease: ${{ steps.check.outputs.prerelease }}
          generate_release_notes: true
